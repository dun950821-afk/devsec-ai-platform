<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevSecAI - 智能安全开发平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    .login-container { display: flex; min-height: 100vh; }
    
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 60px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .brand { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    
    .logo {
      width: 60px; height: 60px;
      background: white; color: #667eea;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: bold;
    }
    
    .brand h1 { font-size: 36px; font-weight: 600; }
    
    .slogan { font-size: 18px; opacity: 0.9; margin-bottom: 40px; }
    
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .feature-item {
      background: rgba(255,255,255,0.1);
      padding: 16px; border-radius: 8px; font-size: 14px;
    }
    
    .login-right {
      width: 480px; background: white; padding: 60px;
      display: flex; flex-direction: column; justify-content: center;
    }
    
    .login-right h2 { font-size: 28px; color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 40px; }
    
    .form-group { margin-bottom: 24px; }
    
    .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    
    .form-group input {
      width: 100%; padding: 14px 16px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; transition: border-color 0.3s;
    }
    
    .form-group input:focus { outline: none; border-color: #667eea; }
    
    .error {
      color: #e74c3c; padding: 10px;
      background: #fdeaea; border-radius: 4px;
      margin-bottom: 16px; font-size: 14px; display: none;
    }
    
    .success {
      color: #27ae60; padding: 10px;
      background: #eafaf1; border-radius: 4px;
      margin-bottom: 16px; font-size: 14px; display: none;
    }
    
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: transform 0.2s;
    }
    
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    
    .footer { margin-top: 40px; text-align: center; color: #999; font-size: 12px; }
    
    /* Dashboard */
    .dashboard { min-height: 100vh; background: #f5f7fa; display: none; }
    .dashboard.active { display: block; }
    
    .header {
      background: white; padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .header-left { display: flex; align-items: center; gap: 12px; }
    
    .logo-small {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }
    
    .title { font-size: 18px; font-weight: 600; color: #333; }
    
    .header-right { display: flex; align-items: center; gap: 16px; }
    
    .logout-btn {
      padding: 8px 16px; background: #f5f5f5;
      border: none; border-radius: 4px; cursor: pointer;
    }
    
    .content { padding: 24px; }
    
    .welcome-card {
      background: white; padding: 32px; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .welcome-card h2 { margin-bottom: 16px; color: #333; }
    .welcome-card p { color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="loginPage" class="login-container">
    <div class="login-left">
      <div class="brand">
        <div class="logo">DS</div>
        <h1>DevSecAI</h1>
      </div>
      <p class="slogan">智能安全开发平台</p>
      <div class="features">
        <div class="feature-item">SCA 组件分析</div>
        <div class="feature-item">SAST 代码扫描</div>
        <div class="feature-item">Secrets 密钥检测</div>
        <div class="feature-item">AI 智能修复</div>
      </div>
    </div>
    <div class="login-right">
      <h2>用户登录</h2>
      <p class="subtitle">欢迎使用 DevSecAI 智能安全开发平台</p>
      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" value="admin">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" value="admin123">
        </div>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <button type="submit" class="login-btn" id="loginBtn">登 录</button>
      </form>
      <div class="footer">
        <p>DevSecAI v1.0.0</p>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <header class="header">
      <div class="header-left">
        <span class="logo-small">DS</span>
        <span class="title">DevSecAI</span>
      </div>
      <div class="header-right">
        <span id="userName">管理员</span>
        <button class="logout-btn" onclick="handleLogout()">退出</button>
      </div>
    </header>
    <div class="content">
      <div class="welcome-card">
        <h2>欢迎使用 DevSecAI 智能安全开发平台</h2>
        <p>登录成功！您已成功连接到系统。</p>
        <p style="margin-top:16px;">当前版本: v1.0.0</p>
      </div>
    </div>
  </div>

  <script>
    var token = localStorage.getItem('token') || '';
    
    function init() {
      if (token) {
        showDashboard();
      }
    }
    
    function showDashboard() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
    }
    
    function showLogin() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('dashboard').classList.remove('active');
    }
    
    function handleLogin(e) {
      if (e) e.preventDefault();
      
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var errorMsg = document.getElementById('errorMsg');
      var successMsg = document.getElementById('successMsg');
      var loginBtn = document.getElementById('loginBtn');
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (!username || !password) {
        errorMsg.textContent = '请输入用户名和密码';
        errorMsg.style.display = 'block';
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.code === 200) {
          token = data.data.token;
          localStorage.setItem('token', token);
          successMsg.textContent = '登录成功！正在跳转...';
          successMsg.style.display = 'block';
          setTimeout(function() {
            showDashboard();
          }, 1000);
        } else {
          errorMsg.textContent = data.message || '登录失败';
          errorMsg.style.display = 'block';
        }
      })
      .catch(function(error) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.style.display = 'block';
      })
      .finally(function() {
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
      });
    }
    
    function handleLogout() {
      token = '';
      localStorage.removeItem('token');
      document.getElementById('username').value = 'admin';
      document.getElementById('password').value = 'admin123';
      showLogin();
    }
    
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    init();
  </script>
</body>
</html>
