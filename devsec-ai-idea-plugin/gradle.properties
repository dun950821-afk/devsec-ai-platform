# DevSecAI IDEA Plugin - Gradle Properties
#
# To use your LOCAL IDEA installation (avoid downloading ~1GB ZIP):
#   1. Find your IDEA installation path, e.g.:
#      Windows: D:\Program Files\JetBrains\IntelliJ IDEA 2026.1.3
#      macOS:   /Applications/IntelliJ IDEA.app
#      Linux:   /opt/jetbrains/idea-IU-261.25134.95
#   2. Uncomment and set the line below:
#
#ideaInstallationPath=D:\\Program Files\\JetBrains\\IntelliJ IDEA 2026.1.3
#
# Or pass via command line:
#   .\gradlew.bat buildPlugin -PideaInstallationPath="D:\Program Files\JetBrains\IntelliJ IDEA 2026.1.3"
#
# If this property is NOT set, Gradle will download IDEA 2026.1.3 from remote (~1GB).

# Gradle JVM settings
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m

# Kotlin daemon settings
kotlin.daemon.jvmargs=-Xmx2g
