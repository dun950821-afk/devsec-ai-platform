server:
  port: ${DEPLOY_RUN_PORT:8080}

spring:
  application:
    name: devsec-ai-server
  
  # PostgreSQL 数据库配置（从环境变量获取）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${COZE_SUPABASE_URL}:5432/postgres
    username: postgres
    password: ${COZE_SUPABASE_PASSWORD:}
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.guoshun.devsecai.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ${JWT_SECRET:DevSecAI@2024#SecretKeyForJWTTokenGeneration!}
  expiration: 86400000  # 24小时

# 日志配置
logging:
  level:
    com.guoshun.devsecai: DEBUG
    org.springframework.security: INFO
