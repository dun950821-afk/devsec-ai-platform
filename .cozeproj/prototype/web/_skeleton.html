<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 — 安定感靛蓝，安全领域信赖色 === */
      --color-primary:              #4F5BD5;
      --color-primary-container:    #E0E3FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 — 冷灰中性底，不混入品牌色相 === */
      --color-background:                 #F4F5F9;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EAEBF0;
      --color-surface-container-high:     #E0E1E8;
      --color-surface-container-highest:  #D3D4DC;
      /* === 文字 === */
      --color-on-surface:           #1A1D2E;
      --color-on-surface-variant:   #6B7085;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #C4C6D0;
      --color-outline-variant:  #DDDEE5;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-5 border-b border-outline-variant/15">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 bg-primary rounded-md flex items-center justify-center">
        <i data-lucide="shield-check" class="w-4 h-4 text-on-primary"></i>
      </div>
      <span class="font-bold text-base text-on-surface">DevSecAI</span>
      <span class="text-xs text-on-surface-variant ml-1">插件管理平台</span>
    </div>
    <div class="flex items-center gap-4">
      <button class="relative p-1.5 rounded-md hover:bg-surface-container transition-colors">
        <i data-lucide="bell" class="w-4 h-4 text-on-surface-variant"></i>
        <span class="absolute top-0.5 right-0.5 w-2 h-2 bg-error rounded-full"></span>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-primary/15 rounded-full flex items-center justify-center text-xs font-semibold text-primary">初</div>
        <span class="text-sm text-on-surface">小初</span>
      </div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <aside class="w-52 shrink-0 bg-[#0F1629] overflow-y-auto">
      <div class="p-3 space-y-0.5">
        <a href="home.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant/[.55] hover:bg-white/[.06] hover:text-white font-medium text-sm transition-colors">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>首页总览
        </a>
        <a href="plugin.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant/[.55] hover:bg-white/[.06] hover:text-white font-medium text-sm transition-colors">
          <i data-lucide="puzzle" class="w-4 h-4"></i>插件管理
        </a>
        <a href="capability.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant/[.55] hover:bg-white/[.06] hover:text-white font-medium text-sm transition-colors">
          <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>能力配置
        </a>
        <a href="token.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant/[.55] hover:bg-white/[.06] hover:text-white font-medium text-sm transition-colors">
          <i data-lucide="key-round" class="w-4 h-4"></i>Token管理
        </a>
      </div>
    </aside>
    <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- 页面内容由子Agent填充 -->
    </main>
    <!-- @main-content:end -->
  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
